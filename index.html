            </div>
            <div style={{ fontSize:11, fontWeight:700, color:"#555", marginBottom:6 }}>🔖 RÉFÉRENCE DE PAIEMENT WAVE</div>
            <input value={txRef} onChange={e => { setTxRef(e.target.value); setError(""); }} placeholder="Ex: TXN-CI-20260307-XXXXX"
              style={{ width:"100%", padding:"12px 14px", border:"1.5px solid #e5e5e5", borderRadius:12, fontSize:13, fontFamily:"Poppins,sans-serif", outline:"none", marginBottom:8, letterSpacing:1 }} />
            {error && <div style={{ color:"#ef4444", fontSize:12, marginBottom:8, fontWeight:600 }}>{error}</div>}
            <button onClick={handleWavePaid} style={{ width:"100%", padding:14, background:"linear-gradient(135deg,#16a34a,#15803d)", color:"white", border:"none", borderRadius:13, fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"Poppins,sans-serif", marginBottom:10 }}>
              ✅ J'ai payé — Activer l'app
            </button>
            <button onClick={() => setStep("choice")} style={{ width:"100%", padding:11, background:"#f5f5f5", color:"#888", border:"none", borderRadius:12, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"Poppins,sans-serif" }}>← Retour</button>
          </>)}

          {step === "code" && (<>
            <div style={{ background:"#f0fdf4", borderRadius:14, padding:"14px 16px", marginBottom:14, textAlign:"center" }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#16a34a", marginBottom:5 }}>✅ Paiement enregistré !</div>
              <div style={{ fontSize:11, color:"#555", lineHeight:1.6 }}>Votre code a été généré. Le vendeur a été notifié sur WhatsApp. Entrez le code pour activer.</div>
            </div>
            <div style={{ fontSize:11, fontWeight:700, color:"#555", marginBottom:6 }}>🔑 VOTRE CODE D'ACTIVATION</div>
            <input value={code} onChange={e => { setCode(e.target.value.toUpperCase()); setError(""); }} onKeyDown={e => e.key==="Enter" && handleActivateCode()} placeholder="XXXX-XXXX"
              style={{ width:"100%", padding:"13px 16px", border: error ? "2px solid #ef4444" : "2px solid #F97316", borderRadius:12, fontSize:20, fontFamily:"Poppins,sans-serif", outline:"none", textAlign:"center", letterSpacing:5, fontWeight:800, marginBottom:8, color:"#1a1a2e", background:"#FFF7ED" }} />
            {error && <div style={{ color:"#ef4444", fontSize:12, marginBottom:8, fontWeight:600, textAlign:"center" }}>{error}</div>}
            <button onClick={handleActivateCode} style={{ width:"100%", padding:14, background:"linear-gradient(135deg,#F97316,#EA580C)", color:"white", border:"none", borderRadius:13, fontSize:14, fontWeight:800, cursor:"pointer", fontFamily:"Poppins,sans-serif" }}>
              🔓 Activer l'application
            </button>
          </>)}

          {step === "success" && (
            <div style={{ textAlign:"center", padding:"16px 0" }}>
              <div style={{ fontSize:56 }}>🎉</div>
              <div style={{ fontSize:17, fontWeight:800, color:"#16a34a", marginTop:12 }}>Application activée !</div>
              <div style={{ fontSize:13, color:"#888", marginTop:8 }}>Bonne utilisation de Mon Supermarché 🛒</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [selectedStore, setSelectedStore] = useState(null);
  const [products, setProducts]           = useState(INIT_PRODUCTS);
  const [activeCategory, setActiveCategory] = useState("top");
  const [cart, setCart]                   = useState({});
  const [activeNav, setActiveNav]         = useState(0);
  const [showCart, setShowCart]           = useState(false);
  const [showMenu, setShowMenu]           = useState(false);
  const [search, setSearch]               = useState("");
  const [favorites, setFavorites]         = useState(new Set());
  const [zone, setZone]                   = useState("Abidjan-Nord");
  const [showZones, setShowZones]         = useState(false);
  const [adminMode, setAdminMode]         = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [adminPassword, setAdminPassword] = useState(DEFAULT_PASSWORD);
  const [showChangePwd, setShowChangePwd] = useState(false);
  const [showStoreInfo, setShowStoreInfo] = useState(false);
  const [storeInfo, setStoreInfo]         = useState({ name:"Mon Supermarché", slogan:"Frais, rapide et livré chez vous 🚚", phone:"", address:"", website:"", logo:null, banner:null, color1:"#F97316", color2:"#EA580C", adminWhatsapp:"" });
  const [editProduct, setEditProduct]     = useState(null);
  const [addNew, setAddNew]               = useState(false);
  const [orders, setOrders]               = useState([]);
  const [showCheckout, setShowCheckout]   = useState(false);
  const [showSuccess, setShowSuccess]     = useState(null);
  const [showOrders, setShowOrders]       = useState(false);
  const [applications, setApplications]   = useState([]);
  const [showPartners, setShowPartners]   = useState(false);
  const [toast, setToast]                 = useState(null);
  const [logoTaps, setLogoTaps]           = useState(0);
  // Licence
  const [license, setLicense]             = useState({ activated: false, code: null, trialStart: Date.now() });
  const [sellerPinInput, setSellerPinInput] = useState("");
  const [sellerPinTaps, setSellerPinTaps] = useState(0);
  const [showSellerPanel, setShowSellerPanel] = useState(false);
  const [showShopClosed, setShowShopClosed] = useState(false);

  // ── COMPTE CLIENT & FIDÉLITÉ ──────────────────────────────────────────────
  const [currentCustomer, setCurrentCustomer] = useState(() => {
    try {
      const key = localStorage.getItem("ms_current_customer");
      if (!key) return null;
      const customers = JSON.parse(localStorage.getItem("ms_customers") || "{}");
      return customers[key] || null;
    } catch { return null; }
  });
  const [showCustomerLogin, setShowCustomerLogin] = useState(false);
  const [showCustomerProfile, setShowCustomerProfile] = useState(false);
  const [showNotifCenter, setShowNotifCenter] = useState(false);
  const [showPromoPanel, setShowPromoPanel] = useState(false);
  const [showAdsPanel, setShowAdsPanel] = useState(false);
  const [showDriversPanel, setShowDriversPanel] = useState(false);
  const [showLangPicker, setShowLangPicker] = useState(false);
  const [lang, setLang] = useState(() => localStorage.getItem("ms_lang") || DEFAULT_LANG);
  const T = LANGS[lang] || LANGS.fr;
  const saveLang = (l) => { setLang(l); localStorage.setItem("ms_lang", l); };
  const [localAds, setLocalAds] = useState([
    { title:"Brassivoire — Fête la bière !", subtitle:"Promotions sur toutes les bières ce weekend 🍺", emoji:"🍺", bgColor:"linear-gradient(135deg,#b45309,#92400e)", textColor:"#ffffff", cta:"Voir", ctaColor:"#F97316", link:"", active:false },
    { title:"Nestlé CI — Produits frais", subtitle:"Découvrez notre gamme laitière en supermarché", emoji:"🥛", bgColor:"linear-gradient(135deg,#1a1a2e,#0f3460)", textColor:"#ffffff", cta:"Découvrir", ctaColor:"#F97316", link:"", active:false },
  ]);
  const [notifications, setNotifications] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ms_notifs") || "[]"); } catch { return []; }
  });
  const unreadNotifs = notifications.filter(n => !n.read).length;

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  // 🔔 Alerte propriétaire — une seule fois à la première installation
  useEffect(() => {
    if (!selectedStore) return;
    const alertKey = "ms_alerted_" + selectedStore.name.replace(/\s/g,"_");
    if (localStorage.getItem(alertKey)) return;
    localStorage.setItem(alertKey, "1");
    const now = new Date();
    const dateHeure = now.toLocaleDateString("fr-FR", { day:"2-digit", month:"long", year:"numeric" }) +
                      " à " + now.toLocaleTimeString("fr-FR", { hour:"2-digit", minute:"2-digit" });
    const msg = [
      "🔔 *NOUVELLE INSTALLATION — Mon Supermarché*",
      "━━━━━━━━━━━━━━━━━━",
      "🏪 *Supermarché :* " + selectedStore.name,
      "📍 *Zone :* " + (selectedStore.zone||"—") + " — " + (selectedStore.city||"—"),
      "📅 *Date & Heure :* " + dateHeure,
      "━━━━━━━━━━━━━━━━━━",
      "⚠️ Message envoyé une seule fois. Si ce supermarché n'est pas votre client, contactez-le.",
    ].join("\n");
    setTimeout(() => {
      window.open("https://wa.me/" + OWNER_WHATSAPP + "?text=" + encodeURIComponent(msg), "_blank");
    }, 3000);
  }, []);


  // Défini ici pour être disponible partout dans le composant
  const isBlocked = !license.activated && trialDaysLeft(license.trialStart) <= 0;
  const isTrialActive = !license.activated && trialDaysLeft(license.trialStart) > 0;

  const addToCart = (id) => {
    if (isBlocked) { setShowShopClosed(true); return; }
    setCart(c => ({ ...c, [id]: (c[id]||0)+1 }));
  };
  const removeFromCart = (id) => setCart(c => { const n={...c}; n[id]>1?n[id]--:delete n[id]; return n; });
  const toggleFav = (id) => setFavorites(f => { const n=new Set(f); n.has(id)?n.delete(id):n.add(id); return n; });

  const handleLogoTap = () => {
    const next = logoTaps + 1;
    setLogoTaps(next);
    if (next >= 5) {
      setLogoTaps(0);
      if (!adminMode) setShowAdminLogin(true);
      else { setAdminMode(false); showToast("🔒 Mode admin désactivé"); }
    }
  };

  // Appui long sur le logo = panneau vendeur (3 secondes)
  const longPressTimer = useRef(null);
  const handleLogoPressStart = () => {
    longPressTimer.current = setTimeout(() => {
      setShowSellerPanel(true);
    }, 3000);
  };
  const handleLogoPressEnd = () => {
    clearTimeout(longPressTimer.current);
  };

  const totalItems = Object.values(cart).reduce((a,b) => a+b, 0);
  const totalPrice = Object.entries(cart).reduce((sum,[id,qty]) => { const p=products.find(p=>p.id===+id); return sum+(p?p.price*qty:0); }, 0);
  const cartProducts = products.filter(p => cart[p.id]);

  const filtered = products.filter(p => {
    const matchCat = activeNav===3 ? favorites.has(p.id) : p.category===activeCategory;
    return matchCat && (search===""||p.name.toLowerCase().includes(search.toLowerCase()));
  });
  const subCats = [...new Set(filtered.map(p => p.sub).filter(Boolean))];

  const onSaveProduct = (updated) => {
    if (updated.id) { setProducts(prev => prev.map(p => p.id===updated.id?updated:p)); showToast("✅ Produit mis à jour !"); }
    else { setProducts(prev => [...prev, { ...updated, id: Date.now() }]); showToast("✅ Produit ajouté !"); }
    setEditProduct(null); setAddNew(false);
  };
  const onDeleteProduct = (id) => { setProducts(prev => prev.filter(p => p.id!==id)); setEditProduct(null); setAddNew(false); showToast("🗑️ Produit supprimé"); };

  const handleConfirmOrder = (clientInfo) => {
    const newOrder = { id: String(Date.now()).slice(-6), date: new Date().toISOString(), clientName:clientInfo.name, whatsapp:clientInfo.whatsapp, address:clientInfo.address, note:clientInfo.note, transport:clientInfo.transport, livraison:clientInfo.livraison, total:clientInfo.total, status:"nouvelle", items:cartProducts.map(p=>({id:p.id,name:p.name,emoji:p.emoji,detail:p.detail,price:p.price,qty:cart[p.id]})) };
    setOrders(prev => [...prev, newOrder]);

    // ── Fidélité : ajouter points au client connecté ──
    if (currentCustomer) {
      try {
        const customers = JSON.parse(localStorage.getItem("ms_customers") || "{}");
        const key = currentCustomer.phone;
        if (customers[key]) {
          customers[key].points = (customers[key].points || 0) + POINTS_PER_ORDER;
          customers[key].ordersCount = (customers[key].ordersCount || 0) + 1;
          localStorage.setItem("ms_customers", JSON.stringify(customers));
          setCurrentCustomer({ ...customers[key] });
          // Notification de points gagnés
          const notif = { emoji:"🎉", title:`+${POINTS_PER_ORDER} points gagnés !`, body:`Vous avez maintenant ${customers[key].points} points. Continuez pour monter de niveau !`, ts: Date.now(), read: false };
          const updated = [notif, ...notifications];
          setNotifications(updated);
          localStorage.setItem("ms_notifs", JSON.stringify(updated));
        }
      } catch {}
    }

    setShowCheckout(false); setShowCart(false); setCart({}); setShowSuccess(newOrder);
  };

  const handleUpdateStatus = (orderId, newStatus) => {
    setOrders(prev => prev.map(o => o.id===orderId ? {...o,status:newStatus} : o));
    if (newStatus === "pret") {
      const order = orders.find(o => o.id===orderId);
      if (order) { const ticket=generateTicket({...order,status:"pret"},storeInfo.name); const num=order.whatsapp.replace(/[\s\-\+\(\)]/g,""); window.open(`https://wa.me/${num}?text=${encodeURIComponent(ticket)}`,"_blank"); }
      showToast("✅ Ticket WhatsApp envoyé au client !");
    } else { showToast("📦 Statut mis à jour"); }
  };

  const handleUpdateAppStatus = (appId, newStatus) => {
    setApplications(prev => prev.map(a => a.id===appId ? {...a, status:newStatus} : a));
    const labels = { contacte:"📞 Marqué Contacté", accepte:"✅ Candidature Acceptée !", refuse:"❌ Candidature Refusée", nouvelle:"↩️ Remis en Nouvelle" };
    showToast(labels[newStatus] || "Statut mis à jour");
  };

  const handleCustomerLogin = (customer) => {
    setCurrentCustomer(customer);
    setShowCustomerLogin(false);
    showToast(`✅ Bienvenue ${customer.name} ! 🎉`);
  };

  const handleCustomerLogout = () => {
    localStorage.removeItem("ms_current_customer");
    setCurrentCustomer(null);
    setShowCustomerProfile(false);
    showToast("👋 Déconnecté");
  };

  const handleSendPromo = (promo) => {
    const updated = [promo, ...notifications];
    setNotifications(updated);
    localStorage.setItem("ms_notifs", JSON.stringify(updated));
    showToast("📢 Promotion envoyée à tous les clients !");
  };

  const handleOpenNotifs = () => {
    setShowNotifCenter(true);
    // Marquer tout comme lu
    const read = notifications.map(n => ({ ...n, read: true }));
    setNotifications(read);
    localStorage.setItem("ms_notifs", JSON.stringify(read));
  };

  const handleClearNotifs = () => {
    setNotifications([]);
    localStorage.removeItem("ms_notifs");
  };

  const goTo = (key) => { setActiveCategory(key); setActiveNav(0); setShowCart(false); setShowMenu(false); };

  const handleSelectStore = (store) => {
    setSelectedStore(store);
    setStoreInfo(prev => ({ ...prev, name:store.name, slogan:store.address, phone:store.phone, address:store.address, color1:store.color1, color2:store.color2 }));
    const pays = PAYS_AFRIQUE.find(p => p.code === store.country);
    if (pays) {
      CURRENCY = pays.symbol;
      localStorage.setItem("ms_currency", pays.symbol);
      if (pays.langDef && !localStorage.getItem("ms_lang")) saveLang(pays.langDef);
    }
  };

  const handlePartnerRequest = (formData) => {
    const app = { ...formData, id: String(Date.now()).slice(-6), date: new Date().toISOString(), status: "nouvelle" };
    setApplications(prev => [...prev, app]);
  };

  // ── Accès panneau vendeur : taper SELLER_PIN dans un champ invisible ──
  const handleSellerPinKey = (e) => {
    if (e.key === "Enter") {
      if (sellerPinInput.trim().toUpperCase() === SELLER_PIN) {
        setShowSellerPanel(true);
        setSellerPinInput("");
      } else {
        setSellerPinInput("");
      }
    }
  };

  // ── Ecran de blocage si essai expiré — SUPPRIMÉ
  // L'app s'affiche toujours, seule la commande est bloquée

  // ── Afficher le sélecteur si pas de supermarché choisi ──
  if (!selectedStore) {
    return <StoreSelector onSelect={handleSelectStore} onPartnerRequest={handlePartnerRequest} adminWhatsapp={storeInfo.adminWhatsapp} />;
  }

  const C1 = storeInfo.color1;
  const C2 = storeInfo.color2;

  return (
    <div style={{ fontFamily:"'Poppins',sans-serif", background:"#f7f8fa", minHeight:"100vh", maxWidth:430, margin:"0 auto", position:"relative" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        .sx{display:flex;overflow-x:auto;gap:8px;padding:0 12px 8px;scrollbar-width:none}
        .sx::-webkit-scrollbar{display:none}
        .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 10px 8px}
        .slide{position:fixed;top:0;bottom:0;background:white;z-index:100;overflow-y:auto;transition:transform .3s cubic-bezier(.4,0,.2,1)}
        .cart-s{right:0;width:100%;max-width:430px;transform:translateX(100%)}
        .cart-s.open{transform:translateX(0)}
        .menu-s{left:0;width:300px;transform:translateX(-100%)}
        .menu-s.open{transform:translateX(0)}
        .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
        .nb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;display:flex;justify-content:space-around;padding:8px 0 18px;border-top:1px solid #f0f0f0;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50}
        .bdg{background:#F97316;color:white;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;position:absolute;top:-3px;right:-3px}
        .mi{display:flex;align-items:center;gap:10px;padding:12px 18px;font-size:13px;font-weight:600;color:#333;cursor:pointer;border-bottom:1px solid #f5f5f5}
        .ck{background:linear-gradient(135deg,#F97316,#EA580C);color:white;border:none;width:calc(100% - 28px);margin:14px;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;box-shadow:0 6px 20px rgba(249,115,22,.35)}
        .tst{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap}
      `}</style>

      {toast && <div className="tst">{toast}</div>}

      {showAdminLogin && <AdminLoginModal adminPassword={adminPassword} onSuccess={() => { setShowAdminLogin(false); setAdminMode(true); showToast("🛠️ Mode admin activé"); }} onClose={() => setShowAdminLogin(false)} />}
      {showChangePwd && <ChangePasswordModal currentPassword={adminPassword} onSave={(p) => { setAdminPassword(p); showToast("🔑 Mot de passe mis à jour !"); }} onClose={() => setShowChangePwd(false)} />}
      {showStoreInfo && <StoreInfoModal info={storeInfo} onSave={(info) => { setStoreInfo(info); setShowStoreInfo(false); showToast("🏪 Informations mises à jour !"); }} onClose={() => setShowStoreInfo(false)} />}
      {(editProduct||addNew) && <EditModal product={editProduct||{name:"",detail:"",price:"",emoji:"🛒",category:activeCategory,sub:"",photo:null}} onSave={onSaveProduct} onClose={() => { setEditProduct(null); setAddNew(false); }} onDelete={onDeleteProduct} />}
      {showOrders && <OrdersPanel orders={orders} onUpdateStatus={handleUpdateStatus} storeName={storeInfo.name} onClose={() => setShowOrders(false)} />}
      {showPartners && <PartnersPanel applications={applications} onUpdateStatus={handleUpdateAppStatus} onClose={() => setShowPartners(false)} />}
      {showSellerPanel && <SellerPanel onClose={() => setShowSellerPanel(false)} license={license} storeName={storeInfo.name} onActivate={(code) => setLicense(prev=>({...prev,activated:true,code}))} />}
      {showShopClosed && <ShopClosedModal storeName={storeInfo.name} trialStart={license.trialStart} onActivate={(code) => setLicense(prev=>({...prev,activated:true,code}))} sellerWhatsapp={storeInfo.adminWhatsapp} onClose={()=>setShowShopClosed(false)} />}
      {/* Compte client */}
      {showCustomerLogin && <CustomerLoginModal onClose={() => setShowCustomerLogin(false)} onLogin={handleCustomerLogin} />}
      {showCustomerProfile && currentCustomer && <CustomerProfileModal customer={currentCustomer} onClose={() => setShowCustomerProfile(false)} onLogout={handleCustomerLogout} />}
      {showNotifCenter && <NotifCenterModal notifs={notifications} onClose={() => setShowNotifCenter(false)} onClear={handleClearNotifs} />}
      {showAdsPanel && <AdsPanel onClose={() => setShowAdsPanel(false)} ads={localAds} onSaveAds={setLocalAds} storeName={storeInfo.name} />}
      {showDriversPanel && <DriversPanel onClose={() => setShowDriversPanel(false)} />}
      {showLangPicker && <LanguagePicker lang={lang} onSelect={saveLang} onClose={() => setShowLangPicker(false)} />}
      {/* Champ invisible pour accès panneau vendeur (tapez VENDRE2026 + Entrée) */}
      <input onKeyDown={handleSellerPinKey} value={sellerPinInput} onChange={e=>setSellerPinInput(e.target.value)}
        style={{ position:"fixed", bottom:0, right:0, opacity:0, width:1, height:1 }} />
      {showCheckout && <CheckoutModal cartProducts={cartProducts} cart={cart} totalPrice={totalPrice} storeName={storeInfo.name} onConfirm={handleConfirmOrder} onClose={() => setShowCheckout(false)} />}
      {showSuccess && <OrderSuccessModal order={showSuccess} onClose={() => setShowSuccess(null)} />}
      {showMenu && <div className="ov" onClick={() => setShowMenu(false)} />}

      {/* SIDE MENU */}
      <div className={`slide menu-s ${showMenu?"open":""}`}>
        <div style={{ background:`linear-gradient(135deg,${C1},${C2})`, padding:"52px 18px 16px", color:"white", position:"relative", overflow:"hidden" }}>
          {storeInfo.banner && <img src={storeInfo.banner} alt="" style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover", opacity:.15 }} />}
          <div style={{ position:"relative", display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
            {storeInfo.logo && <img src={storeInfo.logo} alt="logo" style={{ width:38, height:38, borderRadius:9, objectFit:"contain", background:"rgba(255,255,255,.9)", padding:3 }} />}
            <div>
              <div style={{ fontSize:16, fontWeight:800 }}>{storeInfo.name}</div>
              {storeInfo.slogan && <div style={{ fontSize:10, opacity:.85 }}>{storeInfo.slogan}</div>}
            </div>
          </div>
          {storeInfo.phone && <div style={{ position:"relative", fontSize:10, opacity:.8 }}>📞 {storeInfo.phone}</div>}
        </div>
        <div onClick={() => { setSelectedStore(null); setShowMenu(false); }} className="mi" style={{ background:"#fff8f4" }}>
          <span style={{ fontSize:18 }}>🔄</span>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:"#F97316" }}>{T.changeStore}</div>
            <div style={{ fontSize:10, color:"#aaa" }}>Voir tous les magasins CI</div>
          </div>
        </div>

        {/* ── BOUTON ACTIVATION LICENCE ── */}
        {!license.activated ? (
          <div onClick={() => { setShowShopClosed(true); setShowMenu(false); }} className="mi" style={{ background: isTrialActive ? "linear-gradient(135deg,#FFF7ED,#FFEDD5)" : "linear-gradient(135deg,#FEE2E2,#FECACA)", border:"none", borderBottom:"2px solid #F97316" }}>
            <div style={{ background: isTrialActive ? "#F97316" : "#dc2626", borderRadius:10, padding:"6px 8px", display:"flex", alignItems:"center", justifyContent:"center" }}>
              <span style={{ fontSize:20 }}>{isTrialActive ? "⏳" : "🔒"}</span>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:800, color: isTrialActive ? "#F97316" : "#dc2626" }}>
                {isTrialActive ? `Activer l'app — Essai: ${trialDaysLeft(license.trialStart)}j restants` : "🔒 Activer l'application"}
              </div>
              <div style={{ fontSize:10, color:"#888", marginTop:2 }}>
                {isTrialActive ? "Payer via Wave pour activer définitivement" : "Période d'essai terminée — Payez pour continuer"}
              </div>
            </div>
            <span style={{ fontSize:18, color: isTrialActive ? "#F97316" : "#dc2626" }}>→</span>
          </div>
        ) : (
          <div className="mi" style={{ background:"linear-gradient(135deg,#F0FDF4,#DCFCE7)" }}>
            <span style={{ fontSize:20 }}>✅</span>
            <div>
              <div style={{ fontSize:13, fontWeight:800, color:"#16a34a" }}>Licence activée</div>
              <div style={{ fontSize:10, color:"#aaa" }}>Application complète déverrouillée</div>
            </div>
          </div>
        )}

        {/* Bouton Activer / Statut licence */}
        {!license.activated ? (
          <div onClick={() => { setShowShopClosed(true); setShowMenu(false); }} className="mi" style={{ background:"linear-gradient(135deg,#1a73e8,#0d47a1)", cursor:"pointer" }}>
            <span style={{ fontSize:18 }}>〰️</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:800, color:"white" }}>Activer l'application</div>
              <div style={{ fontSize:10, color:"rgba(255,255,255,.75)" }}>
                {trialDaysLeft(license.trialStart) > 0
                  ? `⏳ Essai — ${trialDaysLeft(license.trialStart)} jour${trialDaysLeft(license.trialStart)>1?"s":""} restant${trialDaysLeft(license.trialStart)>1?"s":""}`
                  : "❌ Essai expiré — Payez pour continuer"}
              </div>
            </div>
            <span style={{ background:"#F97316", color:"white", borderRadius:20, padding:"3px 10px", fontSize:10, fontWeight:800 }}>Payer via Wave</span>
          </div>
        ) : (
          <div className="mi" style={{ background:"#f0fdf4" }}>
            <span style={{ fontSize:18 }}>✅</span>
            <div>
              <div style={{ fontSize:13, fontWeight:700, color:"#16a34a" }}>Licence activée</div>
              <div style={{ fontSize:10, color:"#aaa" }}>Application complète débloquée</div>
            </div>
          </div>
        )}

        {/* Bouton inscription livreur */}
        <div onClick={() => { setShowDriversPanel(true); setShowMenu(false); }} className="mi" style={{ background:"linear-gradient(135deg,#0891b2,#0e7490)", cursor:"pointer", margin:"4px 0" }}>
          <span style={{ fontSize:20 }}>🚗</span>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:800, color:"white" }}>Je suis livreur</div>
            <div style={{ fontSize:10, color:"rgba(255,255,255,.75)" }}>Inscrivez-vous pour livrer les commandes</div>
          </div>
          <span style={{ background:"rgba(255,255,255,.2)", color:"white", borderRadius:20, padding:"3px 10px", fontSize:10, fontWeight:700 }}>S'inscrire</span>
        </div>

        {CATEGORIES.map(cat => (
          <div key={cat.key} className="mi" onClick={() => goTo(cat.key)}>
            <span style={{ fontSize:15 }}>{cat.label.split(" ")[0]}</span>
            <span>{cat.label.replace(cat.label.split(" ")[0],"").trim()}</span>
          </div>
        ))}
      </div>

      {/* MAIN */}
      <div>
        {/* ADMIN BAR */}
        {adminMode && (
          <div style={{ background:"linear-gradient(135deg,#1a1a2e,#0f3460)", padding:"10px 12px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:6 }}>
            <div style={{ color:"white", fontSize:12, fontWeight:700 }}>{T.adminMode}</div>
            {isTrialActive && (
              <div style={{ background:"rgba(249,115,22,.25)", border:"1px solid rgba(249,115,22,.5)", borderRadius:10, padding:"5px 12px", fontSize:11, fontWeight:700, color:"#fed7aa" }}>
                ⏳ Essai gratuit — {trialDaysLeft(license.trialStart)} jour{trialDaysLeft(license.trialStart)>1?"s":""} restant{trialDaysLeft(license.trialStart)>1?"s":""}
              </div>
            )}
            {license.activated && (
              <div style={{ background:"rgba(22,163,74,.2)", borderRadius:10, padding:"4px 10px", fontSize:11, fontWeight:700, color:"#86efac" }}>
                ✅ Licence activée
              </div>
            )}
            {!storeInfo.adminWhatsapp && (
              <div onClick={() => setShowStoreInfo(true)} style={{ background:"#f59e0b", borderRadius:10, padding:"5px 12px", fontSize:11, fontWeight:700, color:"white", cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
                ⚠️ Configurez votre WhatsApp pour recevoir les candidatures →
              </div>
            )}
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              <button onClick={() => setShowDriversPanel(true)} style={{ background:"#0891b2", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                {T.drivers}
              </button>
              <button onClick={() => setShowPromoPanel(true)} style={{ background:"#ec4899", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer" }}>{T.promo}</button>
              <button onClick={() => setShowAdsPanel(true)} style={{ background:"#7c3aed", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer" }}>{T.pub}</button>
              <button onClick={() => setAddNew(true)} style={{ background:"#F97316", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer" }}>+ {T.addProduct.replace("+ ","")}</button>
              <button onClick={() => setShowOrders(true)} style={{ background:"#3b82f6", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer" }}>
                {T.orders} {orders.filter(o=>o.status==="nouvelle").length>0 && <span style={{ background:"#ef4444", borderRadius:"50%", padding:"1px 5px", fontSize:10, marginLeft:3 }}>{orders.filter(o=>o.status==="nouvelle").length}</span>}
              </button>
              <button onClick={() => setShowPartners(true)} style={{ background:"#7c3aed", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer", position:"relative" }}>
                {T.partners} {applications.filter(a=>a.status==="nouvelle").length>0 && <span style={{ background:"#ef4444", borderRadius:"50%", padding:"1px 5px", fontSize:10, marginLeft:3 }}>{applications.filter(a=>a.status==="nouvelle").length}</span>}
              </button>
              <button onClick={() => setShowStoreInfo(true)} style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:600, cursor:"pointer" }}>{T.settings}</button>
              <button onClick={() => setShowChangePwd(true)} style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:600, cursor:"pointer" }}>{T.password}</button>
              <button onClick={() => { setAdminMode(false); showToast("🔒 Mode admin désactivé"); }} style={{ background:"rgba(255,255,255,.15)", border:"none", borderRadius:9, padding:"5px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:600, cursor:"pointer" }}>{T.logout}</button>
            </div>
          </div>
        )}

        {/* HEADER */}
        <div style={{ background:`linear-gradient(135deg,${C1},${C2})`, padding:"48px 14px 16px", color:"white", position:"relative", overflow:"hidden" }}>
          {storeInfo.banner && <img src={storeInfo.banner} alt="" style={{ position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover", opacity:.15 }} />}
          <div style={{ position:"relative", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <button onClick={() => setShowMenu(true)} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:10, padding:"7px 10px", cursor:"pointer", fontSize:17, color:"white" }}>☰</button>
            <div
              onClick={handleLogoTap}
              onMouseDown={handleLogoPressStart}
              onMouseUp={handleLogoPressEnd}
              onMouseLeave={handleLogoPressEnd}
              onTouchStart={handleLogoPressStart}
              onTouchEnd={handleLogoPressEnd}
              style={{ display:"flex", alignItems:"center", gap:8, cursor:"default", userSelect:"none" }}
            >
              {storeInfo.logo && <img src={storeInfo.logo} alt="logo" style={{ width:32, height:32, borderRadius:8, objectFit:"contain", background:"rgba(255,255,255,.9)", padding:2 }} />}
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:15, fontWeight:800, lineHeight:1.2 }}>{storeInfo.name} 🛒</div>
                {storeInfo.slogan && <div style={{ fontSize:10, opacity:.85 }}>{storeInfo.slogan}</div>}
              </div>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {/* Cloche notifications */}
              <div style={{ position:"relative" }}>
                <button onClick={handleOpenNotifs} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:10, padding:"7px 10px", cursor:"pointer", fontSize:17 }}>🔔</button>
                {unreadNotifs > 0 && <span className="bdg" style={{ background:"#ef4444" }}>{unreadNotifs}</span>}
              </div>
              {/* Compte client */}
              {currentCustomer ? (
                <button onClick={() => setShowCustomerProfile(true)} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:10, padding:"5px 10px", cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ fontSize:15 }}>{getTier(currentCustomer.points).emoji}</span>
                  <span style={{ fontSize:11, fontWeight:700, color:"white" }}>{currentCustomer.points}pts</span>
                </button>
              ) : (
                <button onClick={() => setShowCustomerLogin(true)} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:10, padding:"7px 10px", cursor:"pointer", fontSize:17 }}>👤</button>
              )}
              {/* Langue */}
              <button onClick={() => setShowLangPicker(true)} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:10, padding:"5px 9px", cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center" }}>
                {LANGS[lang]?.flag}
              </button>
              {/* Panier */}
              <div style={{ position:"relative" }}>
                <button onClick={() => { setShowCart(true); setActiveNav(2); }} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:10, padding:"7px 10px", cursor:"pointer", fontSize:17 }}>🛒</button>
                {totalItems>0 && <span className="bdg">{totalItems}</span>}
              </div>
            </div>
          </div>
          {(storeInfo.phone||storeInfo.address) && (
            <div style={{ position:"relative", display:"flex", gap:12, flexWrap:"wrap", marginBottom:8, fontSize:10, opacity:.9, fontWeight:600 }}>
              {storeInfo.phone && <span>📞 {storeInfo.phone}</span>}
              {storeInfo.address && <span>📍 {storeInfo.address}</span>}
            </div>
          )}
          {/* Zone */}
          <div style={{ position:"relative", display:"inline-block", marginBottom:10 }}>
            <button onClick={() => setShowZones(!showZones)} style={{ background:"rgba(255,255,255,.2)", border:"none", borderRadius:20, padding:"5px 12px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:12, fontWeight:600, cursor:"pointer" }}>📍 {zone} ▾</button>
            {showZones && (
              <div style={{ position:"absolute", top:"110%", left:0, background:"white", borderRadius:12, boxShadow:"0 8px 24px rgba(0,0,0,.15)", zIndex:300, minWidth:180, overflow:"hidden" }}>
                {ZONES.map(z => (
                  <div key={z} onClick={() => { setZone(z); setShowZones(false); }} style={{ padding:"10px 16px", fontSize:13, cursor:"pointer", fontWeight:600, color:z===zone?"#F97316":"#333", background:z===zone?"#fff5ef":"white" }}>{z}</div>
                ))}
              </div>
            )}
          </div>
          {/* Search */}
          <div style={{ position:"relative", background:"white", borderRadius:12, padding:"9px 12px", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:15 }}>🔍</span>
            <input style={{ flex:1, border:"none", outline:"none", fontFamily:"Poppins,sans-serif", fontSize:13 }} placeholder={T.search} value={search} onChange={e => setSearch(e.target.value)} />
            {search && <button onClick={() => setSearch("")} style={{ background:"none", border:"none", cursor:"pointer", fontSize:15, color:"#999" }}>✕</button>}
          </div>
        </div>

        {/* PROMO */}
        <div style={{ margin:"12px 10px 0", borderRadius:16, background:"linear-gradient(135deg,#1a1a2e,#0f3460)", padding:"14px 16px", color:"white", position:"relative", overflow:"hidden" }}>
          <div style={{ fontSize:9, opacity:.7, fontWeight:700, letterSpacing:1, marginBottom:3 }}>LIVRAISON FLEXIBLE</div>
          <div style={{ fontSize:15, fontWeight:800 }}>{T.chooseTransport} 🚗</div>
          <div style={{ fontSize:11, opacity:.8, marginTop:1 }}>Yango · Zem · Taxi · Woro-woro · Coursier</div>
          <div style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", fontSize:46, opacity:.3 }}>🛵</div>
        </div>

        {/* CATEGORY TABS */}
        <div className="sx" style={{ marginTop:12 }}>
          {CATEGORIES.map(cat => (
            <button key={cat.key} onClick={() => goTo(cat.key)}
              style={{ padding:"7px 13px", borderRadius:20, fontSize:12, fontWeight:600, whiteSpace:"nowrap", border:"none", cursor:"pointer", fontFamily:"Poppins,sans-serif", background:activeCategory===cat.key&&activeNav!==3?`linear-gradient(135deg,${C1},${C2})`:"white", color:activeCategory===cat.key&&activeNav!==3?"white":"#555", boxShadow:activeCategory===cat.key&&activeNav!==3?`0 4px 12px ${C1}55`:"0 2px 6px rgba(0,0,0,.06)" }}>
              {cat.label}
            </button>
          ))}
        </div>

        {/* SECTION HEADER */}
        <div style={{ padding:"12px 12px 8px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div style={{ fontSize:16, fontWeight:800, color:"#1a1a1a" }}>{activeNav===3 ? T.myFavorites : CATEGORIES.find(c=>c.key===activeCategory)?.label}</div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <div style={{ fontSize:10, color:C1, fontWeight:700, background:"#fff5ef", padding:"3px 10px", borderRadius:10 }}>{filtered.length} {T.articles}</div>
            {adminMode && <button onClick={() => setAddNew(true)} style={{ background:C1, border:"none", borderRadius:9, padding:"4px 10px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, cursor:"pointer" }}>+ Ajouter</button>}
          </div>
        </div>

        {/* PRODUCTS */}
        <div style={{ paddingBottom:100 }}>
          {/* Bannière publicitaire locale */}
          <AdBanner ads={localAds} />
          {subCats.length > 0 ? subCats.map(sub => (
            <div key={sub}>
              <div style={{ fontSize:14, fontWeight:800, color:"#1a1a1a", padding:"10px 12px 8px" }}>{sub}</div>
              <div className="grid">
                {[...filtered.filter(p => p.sub===sub)].sort((a,b) => (b.sponsored?1:0)-(a.sponsored?1:0)).map(p => <ProductCard key={p.id} product={p} cart={cart} favorites={favorites} addToCart={addToCart} removeFromCart={removeFromCart} toggleFav={toggleFav} adminMode={adminMode} onEdit={setEditProduct} isBlocked={isBlocked} lang={lang} />)}
              </div>
            </div>
          )) : (
            <div className="grid">
              {[...filtered].sort((a,b) => (b.sponsored?1:0)-(a.sponsored?1:0)).map(p => (
                <ProductCard key={p.id} product={p} cart={cart} favorites={favorites} addToCart={addToCart} removeFromCart={removeFromCart} toggleFav={toggleFav} adminMode={adminMode} onEdit={setEditProduct} isBlocked={isBlocked} lang={lang} />
              ))}
            </div>
          )}
          {filtered.length === 0 && (
            <div style={{ textAlign:"center", padding:"48px 20px" }}>
              <div style={{ fontSize:58 }}>🔍</div>
              <div style={{ fontSize:14, fontWeight:700, color:"#bbb", marginTop:10 }}>{T.noProducts}</div>
            </div>
          )}
        </div>
      </div>

      {/* CART PANEL */}
      <div className={`slide cart-s ${showCart?"open":""}`}>
        <div style={{ background:`linear-gradient(135deg,${C1},${C2})`, padding:"48px 16px 18px", color:"white" }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <button onClick={() => { setShowCart(false); setActiveNav(0); }} style={{ background:"rgba(255,255,255,.2)", border:"none", color:"white", borderRadius:10, padding:"6px 12px", cursor:"pointer", fontFamily:"Poppins,sans-serif", fontSize:13, fontWeight:600 }}>{T.back}</button>
            <div style={{ fontSize:18, fontWeight:800 }}>{T.myCart}</div>
          </div>
        </div>
        {cartProducts.length === 0 ? (
          <div style={{ textAlign:"center", padding:60 }}>
            <div style={{ fontSize:68 }}>🛒</div>
            <div style={{ fontSize:14, fontWeight:700, color:"#bbb", marginTop:12 }}>{T.cartEmpty}</div>
          </div>
        ) : (
          <>
            {cartProducts.map(p => (
              <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px", borderBottom:"1px solid #f5f5f5" }}>
                <div style={{ width:44, height:44, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {p.photo ? <img src={p.photo} alt={p.name} style={{ width:44, height:44, objectFit:"contain", borderRadius:8 }} /> : <span style={{ fontSize:34 }}>{p.emoji}</span>}
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:13 }}>{p.name}</div>
                  <div style={{ fontSize:10, color:"#aaa" }}>{p.detail}</div>
                  <div style={{ fontSize:13, fontWeight:800, color:C1 }}>{(p.price*cart[p.id]).toLocaleString()} {CURRENCY}</div>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <button onClick={() => removeFromCart(p.id)} style={qBtn(false)}>−</button>
                  <span style={{ fontWeight:700, minWidth:18, textAlign:"center" }}>{cart[p.id]}</span>
                  <button onClick={() => addToCart(p.id)} style={qBtn(true)}>+</button>
                </div>
              </div>
            ))}
            <div style={{ padding:"12px 14px 0" }}>
              <div style={{ background:"#fff8f4", borderRadius:14, padding:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:7 }}>
                  <span style={{ color:"#888", fontSize:13 }}>{T.total}</span>
                  <span style={{ fontWeight:800, fontSize:15, color:"#F97316" }}>{totalPrice.toLocaleString()} {CURRENCY}</span>
                </div>
                <div style={{ background:"#fffbeb", borderRadius:10, padding:"8px 12px", display:"flex", gap:8, alignItems:"center" }}>
                  <span style={{ fontSize:18 }}>🚗</span>
                  <div style={{ fontSize:11, color:"#92400e", fontWeight:600, lineHeight:1.4 }}>
                    {T.chooseTransport} — Yango, Zem, Taxi, Woro-woro
                  </div>
                </div>
              </div>
            </div>
            <button onClick={() => { if(isBlocked){setShowShopClosed(true);}else{setShowCheckout(true);} }} className="ck">✅ {T.orderBtn} ({totalItems} {T.articles})</button>
          </>
        )}
      </div>

      {/* BOTTOM NAV */}
      <nav className="nb">
        {[{icon:"🏠",label:T.home},{icon:"🔎",label:T.categories},{icon:"🛒",label:T.cart},{icon:"❤️",label:T.favorites},{icon:"👤",label:T.account}].map((item,i) => (
          <div key={i} onClick={() => { setActiveNav(i); setShowCart(i===2); setShowMenu(false); }} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2, cursor:"pointer", position:"relative", padding:"0 10px" }}>
            <div style={{ position:"relative" }}>
              <span style={{ fontSize:22 }}>{item.icon}</span>
              {i===2&&totalItems>0&&<span className="bdg">{totalItems}</span>}
            </div>
            <span style={{ fontSize:9, fontWeight:700, color:activeNav===i?C1:"#bbb" }}>{item.label}</span>
          </div>
        ))}
      </nav>

      {/* PIED DE PAGE LÉGAL */}
      <div style={{ background:"#1a1a2e", padding:"18px 16px 90px", textAlign:"center" }}>
        <div style={{ fontSize:20, marginBottom:6 }}>🛒</div>
        <div style={{ fontSize:12, fontWeight:800, color:"white", marginBottom:4 }}>Mon Supermarché</div>
        <div style={{ fontSize:10, color:"rgba(255,255,255,.5)", marginBottom:10 }}>
          Application e-commerce pour supermarchés en Côte d'Ivoire
        </div>
        <div style={{ width:40, height:1, background:"rgba(255,255,255,.15)", margin:"10px auto" }} />
        <div style={{ fontSize:10, color:"rgba(255,255,255,.6)", fontWeight:700, marginBottom:3 }}>
          © {new Date().getFullYear()} MSC-CI · Réf. KDU-001
        </div>
        <div style={{ fontSize:9, color:"rgba(255,255,255,.35)", lineHeight:1.6, maxWidth:300, margin:"0 auto 10px" }}>
          Tous droits réservés. Toute reproduction, copie ou distribution sans autorisation écrite est strictement interdite.
        </div>
        <div style={{ background:"rgba(249,115,22,.15)", borderRadius:10, padding:"8px 14px", display:"inline-block", marginBottom:8 }}>
          <div style={{ fontSize:9, color:"#F97316", fontWeight:700 }}>⚖️ PROPRIÉTÉ INTELLECTUELLE PROTÉGÉE</div>
          <div style={{ fontSize:8, color:"rgba(255,255,255,.4)", marginTop:2 }}>Loi CI sur la propriété intellectuelle — OAPI</div>
        </div>
        <div style={{ fontSize:8, color:"rgba(255,255,255,.25)", marginTop:6 }}>
          v1.0 · Conçu et développé en Côte d'Ivoire 🇨🇮
        </div>
      </div>

    </div>
  );
}

    // Mount the app
    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    document.getElementById('loading').style.display = 'none';
    root.render(<App />);
  </script>
</body>
</html>
