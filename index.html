// ─── SYSTÈME DE LICENCE ───────────────────────────────────────────────────────
const TRIAL_DAYS   = 7;             // Durée d'essai gratuit
const LICENSE_SALT = "MSC2026CI🇨🇮"; // Sel secret — NE PAS CHANGER après déploiement
const SELLER_PIN   = "VENDRE2026";  // Code secret pour accéder au générateur de licences

// Génère un code de licence unique basé sur le nom du supermarché
function generateLicenseCode(storeName) {
  const str = storeName.trim().toUpperCase() + LICENSE_SALT;
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) + h) ^ str.charCodeAt(i);
    h = h >>> 0; // force unsigned 32-bit
  }
  const raw = h.toString(36).toUpperCase().padStart(8,"0").slice(0,8);
  return raw.slice(0,4) + "-" + raw.slice(4); // format XXXX-XXXX
}

// Vérifie si un code est valide pour un nom de supermarché
function checkLicenseCode(storeName, code) {
  return generateLicenseCode(storeName) === code.trim().toUpperCase();
}

// Calcule les jours restants d'essai
function trialDaysLeft(trialStart) {
  const ms = TRIAL_DAYS * 24 * 60 * 60 * 1000;
  const left = Math.ceil((trialStart + ms - Date.now()) / (1000 * 60 * 60 * 24));
  return Math.max(0, left);
}

                  <div style={{ fontSize:52 }}>🎉</div>
                  <div style={{ fontSize:16, fontWeight:800, color:"#16a34a", marginTop:10 }}>Application activée !</div>
                </div>
              ) : (
                <>
                  <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:6 }}>🔑 CODE D'ACTIVATION</div>
                  <input value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setError(false);}} onKeyDown={e=>e.key==="Enter"&&handleActivate()}
                    placeholder="Ex : A1B2-C3D4" autoFocus
                    style={{ width:"100%", padding:"14px 16px", border:error?"2px solid #e53e3e":"1.5px solid #eee", borderRadius:12, fontSize:20, fontFamily:"monospace", outline:"none", textAlign:"center", letterSpacing:5, fontWeight:700, background:error?"#fff5f5":"#fafafa", marginBottom:8 }} />

                    🔓 Activer maintenant
                  </button>
                </>

        </div>
      </div>
    </div>
  );
}
function generateTicket(order, storeName) {
  const transport = TRANSPORTS.find(t => t.key === order.transport);
  return [
    `🛒 *${storeName}*`,
    `🎫 *TICKET DE COMMANDE*`,
    `━━━━━━━━━━━━━━━━━━`,
    `📋 Commande N° *#${order.id}*`,
    `📅 ${new Date(order.date).toLocaleDateString("fr-FR", { day:"2-digit", month:"long", year:"numeric", hour:"2-digit", minute:"2-digit" })}`,
    `━━━━━━━━━━━━━━━━━━`,
    `👤 *${order.clientName}*`,
    order.address ? `📍 ${order.address}` : null,
    transport ? `🚀 Transport : ${transport.emoji} *${transport.label}* (${transport.price})` : null,
    `━━━━━━━━━━━━━━━━━━`,
    `*ARTICLES COMMANDÉS :*`,
    ...order.items.map(it => `• ${it.name} x${it.qty}  ➜  ${(it.price * it.qty).toLocaleString()} {CURRENCY}`),
    `━━━━━━━━━━━━━━━━━━`,
    `🚚 Livraison : ${order.livraison === "Gratuit 🏪" || order.transport === "retrait" ? "Retrait en magasin 🏪" : `Estimée par ${TRANSPORTS.find(t=>t.key===order.transport)?.label||"votre transporteur"}`}`,
    `💰 *TOTAL : ${order.total.toLocaleString()} {CURRENCY}*`,
    `━━━━━━━━━━━━━━━━━━`,
    `✅ *Votre colis est prêt !*`,
    `Merci pour votre confiance 🙏`,
    `— ${storeName}`,
  ].filter(Boolean).join("\n");
}

function StoreSelector({ onSelect, onPartnerRequest, adminWhatsapp }) {
  const [search, setSearch] = useState("");
  const [country, setCountry] = useState("all");
  const [showJoin, setShowJoin] = useState(false);

  const getPays = (code) => PAYS_AFRIQUE.find(p => p.code === code);

  const filtered = SUPERMARCHÉS.filter(s => {
    const okCountry = country === "all" || s.country === country;
    const okSearch  = search === "" || s.name.toLowerCase().includes(search.toLowerCase()) || s.zone.toLowerCase().includes(search.toLowerCase()) || s.city.toLowerCase().includes(search.toLowerCase());
    return okCountry && okSearch;
  });

  const grouped = country === "all"
    ? PAYS_AFRIQUE.filter(p => SUPERMARCHÉS.some(s => s.country === p.code))
        .map(p => ({ pays: p, stores: filtered.filter(s => s.country === p.code) }))
        .filter(g => g.stores.length > 0)
    : [{ pays: getPays(country) || { name:"", flag:"", code:country }, stores: filtered }];

  const paysWithStores = PAYS_AFRIQUE.filter(p => SUPERMARCHÉS.some(s => s.country === p.code));

  return (
    <div style={{ fontFamily:"'Poppins',sans-serif", background:"#f7f8fa", minHeight:"100vh", maxWidth:430, margin:"0 auto" }}>

        <div style={{ fontSize:13, opacity:.85, marginBottom:14 }}>Choisissez votre supermarché</div>
        <div style={{ background:"white", borderRadius:12, padding:"9px 12px", display:"flex", alignItems:"center", gap:8 }}>
          <span>🔍</span>
          <input style={{ flex:1, border:"none", outline:"none", fontFamily:"Poppins,sans-serif", fontSize:13 }} placeholder="Rechercher un supermarché..." value={search} onChange={e => setSearch(e.target.value)} />

      {/* BANNIÈRE PARTENARIAT */}
      <div onClick={()=>setShowJoin(true)} style={{ margin:"14px 12px 0", borderRadius:16, background:"linear-gradient(135deg,#0f3460,#1a1a2e)", padding:"16px 18px", cursor:"pointer", display:"flex", alignItems:"center", gap:14, boxShadow:"0 4px 20px rgba(15,52,96,0.2)", position:"relative", overflow:"hidden" }}>

        <div style={{ width:48, height:48, borderRadius:14, background:"linear-gradient(135deg,#F97316,#EA580C)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>🤝</div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:10, color:"rgba(255,255,255,.6)", fontWeight:700, marginBottom:2 }}>VOUS ÊTES UN SUPERMARCHÉ ?</div>
          <div style={{ fontSize:14, fontWeight:800, color:"white", marginBottom:2 }}>Rejoignez la plateforme !</div>

// ─── CHANGE PASSWORD MODAL ────────────────────────────────────────────────────
function ChangePasswordModal({ currentPassword, onSave, onClose }) {
  const [oldPwd, setOldPwd] = useState("");
  const [newPwd, setNewPwd] = useState("");
  const [confirm, setConfirm] = useState("");
  const [errors, setErrors] = useState({});
  const [success, setSuccess] = useState(false);

  const handleSave = () => {
    const e = {};
    if (oldPwd !== currentPassword) e.old = "❌ Mot de passe actuel incorrect";
    if (newPwd.length < 6) e.new = "❌ Minimum 6 caractères";
    if (newPwd !== confirm) e.confirm = "❌ Les mots de passe ne correspondent pas";
    if (Object.keys(e).length > 0) { setErrors(e); return; }
    setSuccess(true);
    setTimeout(() => { onSave(newPwd); onClose(); }, 1200);
  };

  const fSt = (k) => ({ ...IST, border: errors[k] ? "1.5px solid #e53e3e" : "1.5px solid #eee", background: errors[k] ? "#fff5f5" : "#fafafa" });

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:700, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"white", width:"100%", maxWidth:360, borderRadius:24, padding:"28px 22px 24px" }}>
        {success ? (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <div style={{ fontSize:52 }}>✅</div>
            <div style={{ fontSize:17, fontWeight:800, marginTop:12, color:"#16a34a" }}>Mot de passe modifié !</div>
          </div>
        ) : (
          <>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <div style={{ fontSize:16, fontWeight:800 }}>🔑 Changer le mot de passe</div>
              <button onClick={onClose} style={{ background:"#f5f5f5", border:"none", borderRadius:8, padding:"5px 9px", cursor:"pointer", fontSize:15 }}>✕</button>
            </div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:6 }}>MOT DE PASSE ACTUEL</div>
              <input type="password" value={oldPwd} onChange={e => { setOldPwd(e.target.value); setErrors({}); }} style={fSt("old")} placeholder="••••••••" />
              {errors.old && <div style={{ fontSize:11, color:"#e53e3e", marginTop:3, fontWeight:600 }}>{errors.old}</div>}
            </div>
            <div style={{ marginBottom:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:6 }}>NOUVEAU MOT DE PASSE</div>
              <input type="password" value={newPwd} onChange={e => { setNewPwd(e.target.value); setErrors({}); }} style={fSt("new")} placeholder="Minimum 6 caractères" />
              {errors.new && <div style={{ fontSize:11, color:"#e53e3e", marginTop:3, fontWeight:600 }}>{errors.new}</div>}
            </div>
            <div style={{ marginBottom:22 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:6 }}>CONFIRMER LE NOUVEAU</div>
              <input type="password" value={confirm} onChange={e => { setConfirm(e.target.value); setErrors({}); }} style={fSt("confirm")} placeholder="Répétez le mot de passe" />
              {errors.confirm && <div style={{ fontSize:11, color:"#e53e3e", marginTop:3, fontWeight:600 }}>{errors.confirm}</div>}
            </div>
            <button onClick={handleSave} style={{ width:"100%", padding:14, background:"linear-gradient(135deg,#F97316,#EA580C)", color:"white", border:"none", borderRadius:14, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"Poppins,sans-serif", marginBottom:10 }}>
              💾 Enregistrer
            </button>
            <button onClick={onClose} style={{ width:"100%", padding:12, background:"#f5f5f5", color:"#666", border:"none", borderRadius:14, fontSize:13, fontWeight:600, cursor:"pointer", fontFamily:"Poppins,sans-serif" }}>
              Annuler
            </button>
          </>
        )}
      </div>
    </div>
  );
}

            <button onClick={() => set("stockQty", Math.max(0, (form.stockQty||0) - 1))}
              style={{ width:38, height:38, borderRadius:"50%", background: form.stockQty > 0 ? "#F97316" : "#e5e5e5", border:"none", color:"white", fontSize:22, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Poppins,sans-serif" }}>−</button>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:36, fontWeight:900, color: form.stockQty === 0 ? "#dc2626" : "#1a1a2e", lineHeight:1, minWidth:60 }}>{form.stockQty ?? "∞"}</div>
              <div style={{ fontSize:10, color:"#aaa", marginTop:3 }}>article{form.stockQty > 1 ? "s" : ""} en stock</div>
            </div>
            <button onClick={() => set("stockQty", (form.stockQty||0) + 1)}
              style={{ width:38, height:38, borderRadius:"50%", background:"#16a34a", border:"none", color:"white", fontSize:22, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
          </div>

          {/* Raccourcis rapides */}
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
            {[0, 5, 10, 20, 50, 100].map(n => (
              <button key={n} onClick={() => set("stockQty", n)}
                style={{ flex:1, minWidth:40, padding:"6px 4px", border: form.stockQty===n ? "2px solid #F97316" : "1.5px solid #e5e5e5", borderRadius:9, background: form.stockQty===n ? "#FFF7ED" : "white", fontFamily:"Poppins,sans-serif", fontSize:12, fontWeight:700, color: form.stockQty===n ? "#F97316" : "#555", cursor:"pointer" }}>
                {n === 0 ? "Épuisé" : n}
              </button>
            ))}
          </div>

          {/* État auto selon quantité */}
          <div style={{ background: form.stockQty === 0 ? "#fff5f5" : form.stockQty <= 5 ? "#fffbeb" : "#f0fdf4", borderRadius:10, padding:"8px 12px", display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:16 }}>{form.stockQty === 0 ? "❌" : form.stockQty <= 5 ? "⚠️" : "✅"}</span>
            <span style={{ fontSize:12, fontWeight:700, color: form.stockQty === 0 ? "#dc2626" : form.stockQty <= 5 ? "#d97706" : "#16a34a" }}>
              {form.stockQty === 0 ? "Rupture de stock — produit indisponible" : form.stockQty <= 5 ? `Stock faible — plus que ${form.stockQty} article${form.stockQty > 1 ? "s" : ""}` : `En stock — ${form.stockQty} articles disponibles`}
            </span>
          </div>
        </div>

        {/* Produit sponsorisé */}
        <div style={{ marginBottom:20 }}>
          <div onClick={() => setF("sponsored", !form.sponsored)} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", border: form.sponsored ? "2.5px solid #f59e0b" : "1.5px solid #e5e5e5", borderRadius:13, padding:"12px 14px", cursor:"pointer", background: form.sponsored ? "#fffbeb" : "white" }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <span style={{ fontSize:22 }}>⭐</span>
              <div>
                <div style={{ fontSize:13, fontWeight:700, color: form.sponsored ? "#d97706" : "#555" }}>Produit Sponsorisé</div>
                <div style={{ fontSize:10, color:"#aaa", marginTop:1 }}>Apparaît en tête de liste · {PRIX_SPONSORING_MENSUEL.toLocaleString("fr-FR")} {CURRENCY}/mois</div>
              </div>
            </div>
            <div style={{ width:42, height:24, borderRadius:12, background: form.sponsored ? "#f59e0b" : "#e5e5e5", position:"relative", transition:"background .2s" }}>
              <div style={{ position:"absolute", top:3, left: form.sponsored ? 20 : 3, width:18, height:18, borderRadius:"50%", background:"white", transition:"left .2s", boxShadow:"0 1px 4px rgba(0,0,0,.2)" }} />
            </div>
          </div>
        </div>

        <button onClick={() => form.name && form.price && onSave({ ...product, ...form, price: Number(form.price), inStock: (form.stockQty ?? 1) > 0 })}
          style={{ width:"100%", padding:14, background:"linear-gradient(135deg,#F97316,#EA580C)", color:"white", border:"none", borderRadius:14, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"Poppins,sans-serif", marginBottom:10 }}>
          💾 Enregistrer
        </button>
        {product.id && (
          <button onClick={() => onDelete(product.id)} style={{ width:"100%", padding:12, background:"#fff0f0", color:"#e53e3e", border:"none", borderRadius:14, fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"Poppins,sans-serif" }}>
            🗑️ Supprimer ce produit
          </button>
        )}
      </div>
    </div>
  );
}

  const [filter, setFilter] = useState("all");

  const sendWA = (order) => {
    const ticket = generateTicket(order, storeName);
    const num = order.whatsapp.replace(/[\s\-\+\(\)]/g, "");
    window.open(`https://wa.me/${num}?text=${encodeURIComponent(ticket)}`, "_blank");

  return (
    <div style={{ position:"fixed", inset:0, background:"#f7f8fa", zIndex:300, overflowY:"auto" }}>

          <button onClick={onClose} style={{ background:"rgba(255,255,255,.15)", border:"none", color:"white", borderRadius:10, padding:"6px 12px", cursor:"pointer", fontFamily:"Poppins,sans-serif", fontSize:13, fontWeight:600 }}>← Retour</button>
          <div style={{ fontSize:17, fontWeight:800 }}>📦 Commandes ({orders.length})</div>

            <div key={k} style={{ background:"rgba(255,255,255,.1)", borderRadius:10, padding:"6px 8px", textAlign:"center" }}>
              <div style={{ fontSize:15, fontWeight:800 }}>{orders.filter(o=>o.status===k).length}</div>
              <div style={{ fontSize:8, opacity:.8 }}>{v.label.split(" ").slice(1).join(" ")}</div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:6, overflowX:"auto" }}>
          {[["all","Toutes"],...Object.entries(STATUS).map(([k,v])=>[k,v.label])].map(([k,l]) => (
            <button key={k} onClick={() => setFilter(k)} style={{ padding:"5px 12px", borderRadius:16, border:"none", cursor:"pointer", fontFamily:"Poppins,sans-serif", fontSize:11, fontWeight:700, whiteSpace:"nowrap", background:filter===k?"#F97316":"rgba(255,255,255,.15)", color:"white" }}>{l}</button>

        <div style={{ padding:"12px 12px 80px" }}>

            <div key={order.id} style={{ background:"white", borderRadius:16, marginBottom:12, boxShadow:"0 2px 10px rgba(0,0,0,.07)", overflow:"hidden" }}>
              <div style={{ background:STATUS[order.status].bg, padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

                  <div style={{ fontSize:13, fontWeight:800 }}>#{order.id} — {order.clientName}</div>
                  <div style={{ fontSize:10, color:"#888", marginTop:1 }}>{new Date(order.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</div>
                </div>
                <div style={{ background:STATUS[order.status].color, color:"white", borderRadius:20, padding:"4px 10px", fontSize:10, fontWeight:700 }}>{STATUS[order.status].label}</div>
              </div>
              <div style={{ padding:"10px 14px" }}>
                {order.items.map((it,i) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                    <span style={{ color:"#444" }}>{it.emoji} {it.name} <span style={{ color:"#F97316", fontWeight:700 }}>x{it.qty}</span></span>
                    <span style={{ fontWeight:700 }}>{(it.price*it.qty).toLocaleString()} {CURRENCY}</span>

                {order.status==="pret" && <button onClick={() => onUpdateStatus(order.id,"livre")} style={ABTN("#6b7280")}>🚚 Marquer livré</button>}

                  <button onClick={() => sendWA(order)} style={ABTN("#25D366")}>📲 Ticket WhatsApp</button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── PRODUCT CARD ─────────────────────────────────────────────────────────────
function ProductCard({ product, cart, favorites, addToCart, removeFromCart, toggleFav, adminMode, onEdit, isBlocked, lang }) {
  const T2 = LANGS[lang] || LANGS.fr;
  const outOfStock = product.inStock === false || product.stockQty === 0;
  const lowStock   = !outOfStock && product.stockQty > 0 && product.stockQty <= 5;
  return (
    <div style={{ background:"white", borderRadius:14, padding:"10px 8px", boxShadow:"0 2px 8px rgba(0,0,0,.06)", position:"relative", opacity: outOfStock ? 0.75 : 1 }}>
      {adminMode
        ? <button onClick={() => onEdit(product)} style={{ position:"absolute", top:5, left:5, background:"#F97316", border:"none", borderRadius:7, width:24, height:24, cursor:"pointer", fontSize:11, display:"flex", alignItems:"center", justifyContent:"center", zIndex:2 }}>✏️</button>
        : <button onClick={() => toggleFav(product.id)} style={{ position:"absolute", top:5, right:5, background:"none", border:"none", fontSize:12, cursor:"pointer" }}>{favorites.has(product.id) ? "❤️" : "🤍"}</button>
      }

      {/* Badge sponsorisé */}
      {product.sponsored && !outOfStock && (
        <div style={{ position:"absolute", top:5, left: adminMode ? 32 : 5, background:"linear-gradient(135deg,#f59e0b,#d97706)", color:"white", borderRadius:8, padding:"2px 7px", fontSize:8, fontWeight:800, zIndex:2, boxShadow:"0 2px 6px rgba(245,158,11,.4)" }}>
          {T2.sponsored}
        </div>
      )}

      {/* Badge rupture */}
      {outOfStock && (
        <div style={{ position:"absolute", top:0, left:0, right:0, bottom:0, borderRadius:14, background:"rgba(255,255,255,0.55)", zIndex:1, display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
          <div style={{ background:"#dc2626", color:"white", borderRadius:20, padding:"4px 10px", fontSize:10, fontWeight:800, textAlign:"center", boxShadow:"0 2px 8px rgba(220,38,38,.4)" }}>
            {T2.outOfStock}
          </div>
        </div>
      )}

      {/* Badge stock faible */}
      {lowStock && !adminMode && (
        <div style={{ position:"absolute", top:5, left:5, background:"#f59e0b", color:"white", borderRadius:8, padding:"2px 6px", fontSize:8, fontWeight:800, zIndex:2 }}>
          {T2.lowStock} {product.stockQty}
        </div>
      )}

      {/* Badge quantité pour admin */}
      {adminMode && product.stockQty !== undefined && product.stockQty < 999 && (
        <div style={{ position:"absolute", top:5, right:5, background: product.stockQty === 0 ? "#dc2626" : product.stockQty <= 5 ? "#f59e0b" : "#16a34a", color:"white", borderRadius:8, padding:"2px 6px", fontSize:9, fontWeight:800, zIndex:3 }}>
          {product.stockQty === 0 ? T2.outOfStock.replace("😔 ","") : `Stock: ${product.stockQty}`}
        </div>
      )}

      <div style={{ height:68, display:"flex", alignItems:"center", justifyContent:"center", marginBottom:6 }}>
        {product.photo
          ? <img src={product.photo} alt={product.name} style={{ maxHeight:68, maxWidth:"100%", objectFit:"contain", borderRadius:8 }} />
          : <span style={{ fontSize:42 }}>{product.emoji}</span>
        }
      </div>
      <div style={{ fontSize:10, fontWeight:700, color:"#1a1a1a", lineHeight:1.3, marginBottom:2 }}>{product.name}</div>
      <div style={{ fontSize:9, color:"#aaa", marginBottom:4 }}>{product.detail}</div>
      <div style={{ fontSize:12, fontWeight:800, color: outOfStock ? "#aaa" : "#F97316", marginBottom: cart[product.id] ? 4 : 22, textDecoration: outOfStock ? "line-through" : "none" }}>{Number(product.price).toLocaleString()} {CURRENCY}</div>
      {!adminMode && (
        outOfStock
          ? <div style={{ position:"absolute", bottom:8, right:8, background:"#f5f5f5", borderRadius:8, padding:"3px 8px" }}>
              <div style={{ fontSize:9, fontWeight:800, color:"#dc2626" }}>{T2.outOfStock.replace("😔 ","")}</div>
            </div>
          : isBlocked
            ? <div onClick={()=>addToCart(product.id)} style={{ position:"absolute", bottom:8, right:8, background:"#f5f5f5", borderRadius:8, padding:"3px 6px", cursor:"pointer" }}>
                <div style={{ fontSize:8, fontWeight:800, color:"#dc2626", whiteSpace:"nowrap" }}>🔒 Fermé</div>
              </div>
            : cart[product.id]
              ? <div style={{ display:"flex", alignItems:"center", gap:3 }}>
                  <button onClick={() => removeFromCart(product.id)} style={qBtn(false)}>−</button>
                  <span style={{ fontWeight:700, fontSize:12, minWidth:14, textAlign:"center" }}>{cart[product.id]}</span>
                  <button onClick={() => addToCart(product.id)} style={qBtn(true)}>+</button>
                </div>
              : <button onClick={() => addToCart(product.id)} style={{ position:"absolute", bottom:8, right:8, width:26, height:26, borderRadius:"50%", background:"linear-gradient(135deg,#F97316,#EA580C)", color:"white", border:"none", fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 3px 8px rgba(249,115,22,.4)" }}>+</button>
      )}
    </div>
  );
}
// COMPTE CLIENT — Inscription / Connexion
// ══════════════════════════════════════════════════════════════════════════════
function CustomerLoginModal({ onClose, onLogin }) {
  const [mode, setMode] = useState("login"); // "login" | "register"
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [err, setErr] = useState("");

  const handleSubmit = () => {
    if (!phone.trim()) { setErr("Entrez votre numéro WhatsApp"); return; }
    if (mode === "register" && !name.trim()) { setErr("Entrez votre nom"); return; }
    const customers = JSON.parse(localStorage.getItem("ms_customers") || "{}");
    const key = phone.replace(/\s/g,"");
    if (mode === "register") {
      if (customers[key]) { setErr("Ce numéro est déjà inscrit ! Connectez-vous."); return; }
      const newCustomer = { name: name.trim(), phone: key, points: 0, ordersCount: 0, createdAt: Date.now() };
      customers[key] = newCustomer;
      localStorage.setItem("ms_customers", JSON.stringify(customers));
      localStorage.setItem("ms_current_customer", key);
      onLogin(newCustomer);
    } else {
      if (!customers[key]) { setErr("Numéro non trouvé. Inscrivez-vous d'abord."); return; }
      localStorage.setItem("ms_current_customer", key);
      onLogin(customers[key]);
    }
  };

  return (
    <div className="ov" style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"white", borderRadius:20, padding:24, width:"90%", maxWidth:360, boxShadow:"0 20px 60px rgba(0,0,0,.3)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
          <div style={{ fontSize:17, fontWeight:800, color:"#1a1a2e" }}>👤 Mon Compte</div>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#888" }}>✕</button>
        </div>
        {/* Onglets */}
        <div style={{ display:"flex", background:"#f5f5f5", borderRadius:12, padding:3, marginBottom:18 }}>
          {["login","register"].map(m => (
            <button key={m} onClick={() => { setMode(m); setErr(""); }} style={{ flex:1, border:"none", borderRadius:10, padding:"8px 0", fontFamily:"Poppins,sans-serif", fontSize:13, fontWeight:700, cursor:"pointer", background: mode===m ? "#F97316" : "transparent", color: mode===m ? "white" : "#888", transition:"all .2s" }}>
              {m==="login" ? "🔑 Se connecter" : "✨ S'inscrire"}
            </button>
          ))}
        </div>
        {mode==="register" && (
          <input placeholder="Votre prénom et nom" value={name} onChange={e=>setName(e.target.value)}
            style={{ width:"100%", border:"1.5px solid #e5e5e5", borderRadius:10, padding:"10px 14px", fontFamily:"Poppins,sans-serif", fontSize:13, marginBottom:10, outline:"none" }} />
        )}
        <input placeholder="Numéro WhatsApp (ex: 0701234567)" value={phone} onChange={e=>setPhone(e.target.value)}
          style={{ width:"100%", border:"1.5px solid #e5e5e5", borderRadius:10, padding:"10px 14px", fontFamily:"Poppins,sans-serif", fontSize:13, marginBottom:10, outline:"none" }} />
        {err && <div style={{ color:"#ef4444", fontSize:12, marginBottom:8 }}>{err}</div>}
        <button onClick={handleSubmit} style={{ width:"100%", background:"linear-gradient(135deg,#F97316,#EA580C)", border:"none", borderRadius:12, padding:"12px 0", color:"white", fontFamily:"Poppins,sans-serif", fontSize:14, fontWeight:700, cursor:"pointer" }}>
          {mode==="login" ? "Se connecter" : "Créer mon compte"}
        </button>
        <div style={{ textAlign:"center", fontSize:11, color:"#aaa", marginTop:12 }}>🔒 Vos données restent sur votre téléphone</div>
      </div>
    </div>
  );
}

// PROFIL CLIENT — Points & Fidélité
// ══════════════════════════════════════════════════════════════════════════════
function CustomerProfileModal({ customer, onClose, onLogout }) {
  const tier = getTier(customer.points);
  const nextTier = LOYALTY_TIERS.find(t => t.min > customer.points);
  const ptsToNext = nextTier ? nextTier.min - customer.points : 0;
  const progress = nextTier ? ((customer.points - getTier(customer.points).min) / (nextTier.min - getTier(customer.points).min)) * 100 : 100;

  return (
    <div className="ov" style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"white", borderRadius:20, width:"90%", maxWidth:360, overflow:"hidden", boxShadow:"0 20px 60px rgba(0,0,0,.3)" }}>
        {/* Header */}
        <div style={{ background:`linear-gradient(135deg,#1a1a2e,#0f3460)`, padding:"28px 20px 20px", color:"white", position:"relative" }}>
          <button onClick={onClose} style={{ position:"absolute", top:12, right:14, background:"rgba(255,255,255,.15)", border:"none", borderRadius:8, padding:"4px 10px", color:"white", cursor:"pointer", fontSize:14 }}>✕</button>
          <div style={{ fontSize:36, marginBottom:6 }}>{tier.emoji}</div>
          <div style={{ fontSize:18, fontWeight:800 }}>{customer.name}</div>
          <div style={{ fontSize:12, color:"#aaa", marginTop:2 }}>📞 {customer.phone}</div>
          <div style={{ display:"inline-block", background:tier.color, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:700, marginTop:8 }}>
            Niveau {tier.name}
          </div>
        </div>

        {/* Points */}
        <div style={{ padding:20 }}>
          {/* Compteur points */}
          <div style={{ background:"linear-gradient(135deg,#FFF7ED,#FFEDD5)", borderRadius:14, padding:16, marginBottom:16, textAlign:"center" }}>
            <div style={{ fontSize:42, fontWeight:900, color:"#F97316", lineHeight:1 }}>{customer.points}</div>
            <div style={{ fontSize:13, color:"#888", fontWeight:600, marginTop:4 }}>Points de fidélité</div>
            <div style={{ fontSize:12, color:"#F97316", fontWeight:700, marginTop:6 }}>+{POINTS_PER_ORDER} pts par commande</div>
          </div>

          {/* Barre de progression */}
          {nextTier && (
            <div style={{ marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#888", marginBottom:6 }}>
                <span>{tier.emoji} {tier.name}</span>
                <span>Encore {ptsToNext} pts → {nextTier.emoji} {nextTier.name}</span>
              </div>
              <div style={{ background:"#f0f0f0", borderRadius:20, height:10, overflow:"hidden" }}>
                <div style={{ width:`${Math.min(progress,100)}%`, height:"100%", background:"linear-gradient(90deg,#F97316,#EA580C)", borderRadius:20, transition:"width .5s" }} />
              </div>
            </div>
          )}

          {/* Avantage */}
          <div style={{ background:"#f5f5f5", borderRadius:12, padding:"10px 14px", marginBottom:16, fontSize:12, color:"#555" }}>
            🎁 <strong>Votre avantage :</strong> {tier.perk}
          </div>

          {/* Stats */}
          <div style={{ display:"flex", gap:10, marginBottom:20 }}>
            <div style={{ flex:1, background:"#f5f5f5", borderRadius:12, padding:12, textAlign:"center" }}>
              <div style={{ fontSize:22, fontWeight:800, color:"#1a1a2e" }}>{customer.ordersCount}</div>
              <div style={{ fontSize:11, color:"#888" }}>Commandes</div>
            </div>
            <div style={{ flex:1, background:"#FFF7ED", borderRadius:12, padding:12, textAlign:"center" }}>
              <div style={{ fontSize:22, fontWeight:800, color:"#F97316" }}>{tier.emoji}</div>
              <div style={{ fontSize:11, color:"#888" }}>Niveau {tier.name}</div>
            </div>
          </div>

          <button onClick={onLogout} style={{ width:"100%", background:"#f5f5f5", border:"none", borderRadius:12, padding:"11px 0", fontFamily:"Poppins,sans-serif", fontSize:13, fontWeight:700, color:"#888", cursor:"pointer" }}>
            Se déconnecter
          </button>
        </div>
      </div>
    </div>
  );
}

// PANNEAU PROMOTIONS (ADMIN) — Envoyer une notif à tous les clients

function PromoPanel({ onClose, storeName, onSendPromo }) {
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");
  const [emoji, setEmoji] = useState("🎉");
  const [sent, setSent] = useState(false);

  const emojis = ["🎉","🔥","🛒","💰","🎁","⚡","🍎","🥩","🧴","📢"];

  const handleSend = () => {
    if (!title.trim() || !body.trim()) return;
    onSendPromo({ title: title.trim(), body: body.trim(), emoji, ts: Date.now(), read: false });
    setSent(true);
  };

  return (
    <div className="ov" style={{ display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ background:"white", borderRadius:20, padding:24, width:"90%", maxWidth:380, boxShadow:"0 20px 60px rgba(0,0,0,.3)" }}>

        {sent ? (
          <div style={{ textAlign:"center", padding:"20px 0" }}>
            <div style={{ fontSize:50, marginBottom:12 }}>✅</div>
            <div style={{ fontSize:15, fontWeight:700, color:"#16a34a" }}>Promotion envoyée !</div>
            <div style={{ fontSize:13, color:"#888", marginTop:6 }}>{count} client{count>1?"s":""} notifié{count>1?"s":""}</div>
            <button onClick={onClose} style={{ marginTop:20, background:"#F97316", border:"none", borderRadius:12, padding:"10px 30px", color:"white", fontFamily:"Poppins,sans-serif", fontSize:13, fontWeight:700, cursor:"pointer" }}>Fermer</button>
          </div>
        ) : (
          <>
            {/* Stats clients */}

                  <div style={{ fontSize:11, color:"#aaa", marginTop:3 }}>{body || "Message..."}</div>

              </div>
            )}

            <button onClick={handleSend} disabled={!title||!body} style={{ width:"100%", background: title&&body ? "linear-gradient(135deg,#F97316,#EA580C)" : "#e5e5e5", border:"none", borderRadius:12, padding:"12px 0", color: title&&body ? "white":"#aaa", fontFamily:"Poppins,sans-serif", fontSize:14, fontWeight:700, cursor: title&&body ? "pointer":"default" }}>
              📢 Envoyer à {count} client{count>1?"s":""}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

    { key:"yango",    label:"Yango",     emoji:"🚗" },
    { key:"zem",      label:"Zem",       emoji:"🛵" },
    { key:"taxi",     label:"Taxi",      emoji:"🚕" },

  const saveDrivers = (list) => {
    setDrivers(list);
    localStorage.setItem("ms_drivers", JSON.stringify(list));
  };

            <div style={{ flex:1, background:"rgba(255,255,255,.1)", borderRadius:10, padding:"8px 0", textAlign:"center" }}>
              <div style={{ fontSize:18, fontWeight:800, color:"#f87171" }}>{drivers.filter(d=>d.statut==="suspendu").length}</div>
              <div style={{ fontSize:9, color:"#aaa" }}>Suspendus</div>
            </div>
            <div style={{ flex:1, background:"rgba(255,255,255,.1)", borderRadius:10, padding:"8px 0", textAlign:"center" }}>
              <div style={{ fontSize:18, fontWeight:800, color:"white" }}>{drivers.length}</div>
              <div style={{ fontSize:9, color:"#aaa" }}>Total</div>
            </div>
          </div>
        </div>

        {/* Onglets */}
        <div style={{ display:"flex", borderBottom:"1px solid #f0f0f0", flexShrink:0 }}>

            <button key={k} onClick={() => { setTab(k); setSelected(null); }} style={{ flex:1, padding:"10px 0", border:"none", background:"none", fontFamily:"Poppins,sans-serif", fontSize:12, fontWeight:700, color: tab===k||( tab==="detail"&&k==="liste") ? "#F97316":"#888", borderBottom: tab===k||(tab==="detail"&&k==="liste") ? "2px solid #F97316":"2px solid transparent", cursor:"pointer" }}>{l}</button>
          ))}
        </div>

        <div style={{ flex:1, overflowY:"auto" }}>

          {/* ── LISTE ── */}
          {(tab==="liste" && !selected) && (

                <span style={{ fontSize:14 }}>🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un chauffeur..." style={{ border:"none", background:"none", outline:"none", fontFamily:"Poppins,sans-serif", fontSize:12, flex:1 }} />
              </div>

              {filtered.length === 0 ? (
                <div style={{ textAlign:"center", padding:"32px 0", color:"#aaa" }}>
                  <div style={{ fontSize:48, marginBottom:10 }}>🚗</div>
                  <div style={{ fontSize:13, fontWeight:600 }}>Aucun chauffeur enregistré</div>
                  <div style={{ fontSize:11, marginTop:4 }}>Appuyez sur ➕ Ajouter pour commencer</div>
                </div>
              ) : (
                filtered.map(driver => {
                  const svc = SERVICES.find(s=>s.key===driver.service) || SERVICES[0];
                  return (
                    <div key={driver.id} onClick={() => { setSelected(driver); setTab("detail"); }} style={{ border:"1.5px solid #f0f0f0", borderRadius:14, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12, cursor:"pointer" }}>
                      {driver.photoCni
                        ? <img src={driver.photoCni} alt="" style={{ width:46, height:46, borderRadius:12, objectFit:"cover", flexShrink:0 }} />

                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, fontWeight:800, color:"#1a1a2e" }}>{driver.prenom} {driver.nom}</div>
                        <div style={{ fontSize:11, color:"#888", marginTop:2 }}>{svc.emoji} {svc.label} · {driver.telephone}</div>
                        {driver.couleurVoiture && <div style={{ fontSize:10, color:"#aaa", marginTop:1 }}>{driver.couleurVoiture} {driver.immatriculation && `· ${driver.immatriculation}`}</div>}
                      </div>
                      <div style={{ background: driver.statut==="actif" ? "#f0fdf4" : "#fff5f5", borderRadius:8, padding:"4px 10px", fontSize:10, fontWeight:700, color: driver.statut==="actif" ? "#16a34a":"#dc2626" }}>
                        {driver.statut==="actif" ? "✅ Actif" : "🚫 Suspendu"}
                      </div>
                    </div>
                  );

            </div>
          )}

          {/* ── DÉTAIL CHAUFFEUR ── */}
          {(tab==="detail" && selected) && (
            <div style={{ padding:14 }}>
              <button onClick={() => { setSelected(null); setTab("liste"); }} style={{ background:"none", border:"none", color:"#F97316", fontFamily:"Poppins,sans-serif", fontSize:12, fontWeight:700, cursor:"pointer", marginBottom:12 }}>← Retour</button>

              {/* Profil */}
              <div style={{ background:"linear-gradient(135deg,#f9f9f9,#f0f0f0)", borderRadius:14, padding:16, marginBottom:14, textAlign:"center" }}>

                  ? <img src={selected.photoCni} alt="" style={{ width:72, height:72, borderRadius:"50%", objectFit:"cover", marginBottom:8, border:"3px solid #F97316" }} />
                  : <div style={{ width:72, height:72, borderRadius:"50%", background:"linear-gradient(135deg,#F97316,#EA580C)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:32, margin:"0 auto 8px" }}>👤</div>
                }
                <div style={{ fontSize:16, fontWeight:800, color:"#1a1a2e" }}>{selected.prenom} {selected.nom}</div>

                </div>
                <div style={{ display:"flex", gap:8, justifyContent:"center", marginTop:10 }}>
                  <a href={`tel:${selected.telephone}`} style={{ textDecoration:"none" }}>
                    <div style={{ background:"#16a34a", borderRadius:20, padding:"5px 14px", fontSize:11, fontWeight:700, color:"white" }}>📞 {selected.telephone}</div>
                  </a>
                  <div style={{ background: selected.statut==="actif"?"#f0fdf4":"#fff5f5", borderRadius:20, padding:"5px 14px", fontSize:11, fontWeight:700, color: selected.statut==="actif"?"#16a34a":"#dc2626" }}>
                    {selected.statut==="actif" ? "✅ Actif" : "🚫 Suspendu"}
                  </div>
                </div>
              </div>

              {/* Infos véhicule */}
              <div style={{ background:"#f9f9f9", borderRadius:12, padding:"12px 14px", marginBottom:12 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:8 }}>🚗 INFORMATIONS VÉHICULE</div>
                {[["Couleur", selected.couleurVoiture||"—"], ["Immatriculation", selected.immatriculation||"—"], ["Ajouté le", selected.dateAjout||"—"]].map(([l,v]) => (
                  <div key={l} style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:5, paddingBottom:5, borderBottom:"1px solid #e5e5e5" }}>
                    <span style={{ color:"#888" }}>{l}</span>
                    <span style={{ fontWeight:700, color:"#1a1a2e" }}>{v}</span>
                  </div>
                ))}
              </div>

              {/* Documents */}
              <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:8 }}>📄 DOCUMENTS</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:14 }}>
                {[["photoCni","🪪 CNI"],["photoPermis","🪪 Permis"],["photoVoiture","🚗 Voiture"]].map(([k,l]) => (
                  <div key={k} style={{ borderRadius:12, overflow:"hidden", border:"1px solid #e5e5e5" }}>
                    {selected[k]
                      ? <img src={selected[k]} alt={l} style={{ width:"100%", height:70, objectFit:"cover" }} />
                      : <div style={{ height:70, background:"#f5f5f5", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                          <span style={{ fontSize:20 }}>📷</span>
                        </div>
                    }
                    <div style={{ padding:"4px 6px", fontSize:9, fontWeight:700, color:"#888", textAlign:"center", background:"#fafafa" }}>{l}</div>
                  </div>
                ))}
              </div>

              {/* Actions */}
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => toggleStatut(selected.id)} style={{ flex:1, padding:"11px 0", background: selected.statut==="actif" ? "#fff5f5":"#f0fdf4", border:"none", borderRadius:12, fontFamily:"Poppins,sans-serif", fontSize:12, fontWeight:700, color: selected.statut==="actif"?"#dc2626":"#16a34a", cursor:"pointer" }}>
                  {selected.statut==="actif" ? "🚫 Suspendre" : "✅ Réactiver"}
                </button>
                <button onClick={() => handleDelete(selected.id)} style={{ flex:1, padding:"11px 0", background:"#fff5f5", border:"none", borderRadius:12, fontFamily:"Poppins,sans-serif", fontSize:12, fontWeight:700, color:"#dc2626", cursor:"pointer" }}>
                  🗑️ Supprimer
                </button>
              </div>
            </div>
          )}

          {/* ── FORMULAIRE AJOUTER ── */}
          {tab==="ajouter" && (
            <div style={{ padding:14 }}>
              {/* Service */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:8 }}>SERVICE DE TRANSPORT</div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {SERVICES.map(s => (
                    <div key={s.key} onClick={() => setF("service",s.key)} style={{ border: form.service===s.key?"2.5px solid #F97316":"1.5px solid #e5e5e5", borderRadius:10, padding:"7px 10px", cursor:"pointer", background: form.service===s.key?"#FFF7ED":"white", display:"flex", alignItems:"center", gap:5 }}>
                      <span style={{ fontSize:16 }}>{s.emoji}</span>
                      <span style={{ fontSize:11, fontWeight:700, color: form.service===s.key?"#F97316":"#555" }}>{s.label}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Nom & Prénom */}
              {[["prenom","Prénom","Ex: Kouamé"],["nom","Nom de famille","Ex: Yao"],["telephone","Téléphone","Ex: 0701234567"],["immatriculation","Immatriculation véhicule","Ex: CI-1234-AB"]].map(([k,l,p]) => (
                <div key={k} style={{ marginBottom:10 }}>
                  <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:5 }}>{l.toUpperCase()}</div>
                  <input value={form[k]} onChange={e=>setF(k,e.target.value)} placeholder={p} style={{ width:"100%", border:"1.5px solid #e5e5e5", borderRadius:10, padding:"10px 12px", fontFamily:"Poppins,sans-serif", fontSize:13, outline:"none" }} />
                </div>
              ))}

              {/* Couleur voiture */}
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:8 }}>COULEUR DU VÉHICULE</div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {COULEURS.map(c => (
                    <div key={c} onClick={() => setF("couleurVoiture",c)} style={{ border: form.couleurVoiture===c?"2.5px solid #F97316":"1.5px solid #e5e5e5", borderRadius:8, padding:"5px 8px", cursor:"pointer", background: form.couleurVoiture===c?"#FFF7ED":"white", fontSize:11, fontWeight:600, color: form.couleurVoiture===c?"#F97316":"#555" }}>
                      {c}
                    </div>
                  ))}
                </div>
              </div>

              {/* Photos documents */}
              <div style={{ fontSize:11, fontWeight:700, color:"#888", marginBottom:8 }}>PHOTOS DOCUMENTS</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:16 }}>
                {[["photoCni","🪪 CNI"],["photoPermis","🪪 Permis"],["photoVoiture","🚗 Véhicule"]].map(([k,l]) => (
                  <label key={k} style={{ cursor:"pointer" }}>
                    <input type="file" accept="image/*" capture="environment" onChange={e=>handlePhoto(k,e)} style={{ display:"none" }} />
                    <div style={{ borderRadius:12, overflow:"hidden", border: form[k]?"2px solid #16a34a":"2px dashed #e5e5e5" }}>
                      {form[k]
                        ? <img src={form[k]} alt={l} style={{ width:"100%", height:70, objectFit:"cover" }} />
                        : <div style={{ height:70, background:"#f9f9f9", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4 }}>
                            <span style={{ fontSize:22 }}>📷</span>
                            <span style={{ fontSize:8, fontWeight:700, color:"#aaa", textAlign:"center" }}>Ajouter</span>
                          </div>
                      }
                      <div style={{ padding:"4px 6px", fontSize:9, fontWeight:700, color: form[k]?"#16a34a":"#888", textAlign:"center", background:"#fafafa" }}>{l}</div>
                    </div>
                  </label>
                ))}
              </div>

              <button onClick={handleSave} disabled={!form.nom||!form.telephone} style={{ width:"100%", padding:14, background: form.nom&&form.telephone?"linear-gradient(135deg,#F97316,#EA580C)":"#e5e5e5", border:"none", borderRadius:13, color: form.nom&&form.telephone?"white":"#aaa", fontFamily:"Poppins,sans-serif", fontSize:14, fontWeight:800, cursor: form.nom&&form.telephone?"pointer":"default" }}>
                ✅ Enregistrer le chauffeur
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ShopClosedModal({ storeName, trialStart, onActivate, sellerWhatsapp, onClose }) {
  const [step, setStep]   = useState("choice");
  const [plan, setPlan]   = useState("mensuel");
  const [txRef, setTxRef] = useState("");
  const [code, setCode]   = useState("");
  const [error, setError] = useState("");
  const daysLeft = trialDaysLeft(trialStart);
  const expired  = daysLeft <= 0;
  const montant  = plan === "annuel" ? PRIX_ANNUEL : PRIX_MENSUEL;

  const handleActivateCode = () => {
    if (checkLicenseCode(storeName, code.trim().toUpperCase())) {
      setStep("success");
      setTimeout(() => { onActivate(code.trim().toUpperCase()); onClose(); }, 1800);
    } else {
      setError("❌ Code incorrect — vérifiez et réessayez");
      setTimeout(() => setError(""), 2500);
    }
  };

  const handleWavePaid = () => {
    if (!txRef.trim()) { setError("Entrez la référence de votre paiement Wave"); return; }
    const licCode = generateLicenseCode(storeName);
    const now = new Date();
    const dateStr = now.toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"}) + " à " + now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    const msg = [
      `💰 *PAIEMENT WAVE REÇU — Mon Supermarché*`,
      `━━━━━━━━━━━━━━━━━━`,
      `🏪 *Supermarché :* ${storeName}`,
      `💵 *Montant :* ${montant.toLocaleString("fr-FR")} {CURRENCY}`,
      `📋 *Plan :* Licence ${plan}`,
      `🔖 *Réf. Wave :* ${txRef.trim()}`,
      `📅 *Date :* ${dateStr}`,
      `━━━━━━━━━━━━━━━━━━`,
      `🔑 *Code généré :* ${licCode}`,
      `━━━━━━━━━━━━━━━━━━`,
      `✅ Vérifiez le paiement Wave puis confirmez.`,
      `Le client a reçu son code automatiquement.`,
    ].join("\n");

    setStep("code");
    setError("");

          <div style={{ fontSize:11, opacity:.88 }}>
            {step==="success" ? "Bienvenue ! Bonne utilisation 🛒" : expired ? "Période d'essai terminée" : "Activez pour continuer sans interruption"}

        </div>

        <div style={{ padding:"20px 20px 22px" }}>
